<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Khadija's Arena — Map Gameplay Preview</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07090d;
      color: #dff7ff;
      font-family: system-ui, Arial, sans-serif;
    }

    #c {
      width: 100%;
      height: 100%;
      display: block;
    }

    #panel {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      width: 380px;
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding: 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(0, 212, 255, 0.45);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
      font-size: 13px;
      line-height: 1.5;
    }

    #panel h1 {
      margin: 0 0 8px;
      font-size: 17px;
      color: #ffffff;
      letter-spacing: 1px;
    }

    #panel .sub {
      color: #9fc2cf;
      margin-bottom: 10px;
      font-size: 12px;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      background: #0d1720;
      color: #dff7ff;
      border: 1px solid rgba(0, 212, 255, 0.45);
      border-radius: 7px;
      outline: none;
      font-weight: bold;
    }
	#validation-report {
	  margin-top: 10px;
	  margin-bottom: 10px;
	  padding: 10px;
	  border-radius: 8px;
	  background: rgba(255,255,255,0.04);
	  border: 1px solid rgba(255,255,255,0.12);
	  font-size: 12px;
	  line-height: 1.55;
	  max-height: 170px;
	  overflow: auto;
	}

	#validation-report.ok {
	  border-color: rgba(0, 255, 102, 0.45);
	  color: #bfffd3;
	}

	#validation-report.warn {
	  border-color: rgba(255, 170, 0, 0.65);
	  color: #ffe3aa;
	}

	#validation-report.bad {
	  border-color: rgba(255, 34, 68, 0.75);
	  color: #ffc0c8;
	}
    #stats {
      margin-top: 10px;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      line-height: 1.55;
    }

    .btn-row {
      margin-top: 8px;
    }

    button {
      margin-top: 6px;
      margin-right: 6px;
      padding: 7px 10px;
      background: #0d1720;
      color: #dff7ff;
      border: 1px solid rgba(0, 212, 255, 0.45);
      border-radius: 7px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #162536;
    }

    button.active {
      background: #00d4ff;
      color: #061118;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin-top: 10px;
      font-size: 12px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .green { background: #00ff66; }
    .red { background: #ff2244; }
    .cyan { background: #00d4ff; }
    .orange { background: #ffaa00; }
    .brown { background: #8b5a2b; }
    .purple { background: #b14cff; }
    .yellow { background: #ffee55; }
    .blue { background: #4aa8ff; }
    .pink { background: #ff66cc; }
    .lime { background: #66ff99; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <canvas id="c"></canvas>

  <div id="panel">
    <h1>MAP GAMEPLAY PREVIEW</h1>
    <div class="sub">
      Preview real map builders + gameplay feature markers
    </div>

    <select id="preview-map-select"></select>

    <div id="stats">Loading...</div>
	<div id="validation-report">Validation pending...</div>

    <div class="btn-row">
      <button id="view-angled" class="active">Angled View</button>
      <button id="view-top">Top View</button>
      <button id="reload-map">Reload</button>
      <button id="toggle-markers" class="active">Markers ON</button>
    </div>

    <div class="legend">
      <div><span class="dot green"></span>Spawn</div>
      <div><span class="dot red"></span>Locked Spawn</div>
      <div><span class="dot cyan"></span>Door</div>
      <div><span class="dot orange"></span>Trap</div>
      <div><span class="dot brown"></span>Barricade</div>
      <div><span class="dot purple"></span>Mystery Box</div>
      <div><span class="dot yellow"></span>Ammo / Health</div>
      <div><span class="dot pink"></span>Upgrade / Perk</div>
      <div><span class="dot blue"></span>Wall Buy</div>
      <div><span class="dot lime"></span>Perk Reload</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    import {
      scene,
      camera,
      renderer,
      buildMap,
      spawnPoints,
	  playerSpawnPoints,
	  lockedSpawnPoints,
	  walls,
      doors,
      traps,
      barricades,
      mapMeshes
    } from './js/map.js';

    import {
      MAP_IDS,
      getPlayableMaps,
      getMapMeta
    } from './js/maps/map_registry.js';

    import { getGameplayPointGroups } from './js/maps/gameplay_points.js';

    const mapSelect = document.getElementById('preview-map-select');
    const stats = document.getElementById('stats');
	const validationReport = document.getElementById('validation-report');
	const btnAngled = document.getElementById('view-angled');
    const btnTop = document.getElementById('view-top');
    const btnReload = document.getElementById('reload-map');
    const btnToggle = document.getElementById('toggle-markers');

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    let currentMapId = MAP_IDS.GRID_BUNKER;
    let markersVisible = true;

    const markerGroup = new THREE.Group();
    markerGroup.name = 'map_preview_markers';
    scene.add(markerGroup);

    function fillMapDropdown() {
      mapSelect.innerHTML = '';

      getPlayableMaps().forEach((map) => {
        const opt = document.createElement('option');
        opt.value = map.id;
        opt.textContent = map.name;
        mapSelect.appendChild(opt);
      });

      mapSelect.value = currentMapId;
    }

    function clearMarkers() {
      while (markerGroup.children.length > 0) {
        const child = markerGroup.children[0];
        markerGroup.remove(child);

        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    }

    function addMarker(pos, color, radius = 0.32, height = 0.18) {
      if (!pos) return;

      const geo = new THREE.CylinderGeometry(radius, radius, height, 16);
      const mat = new THREE.MeshBasicMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);

      mesh.position.set(pos.x, height * 0.5 + 0.06, pos.z);
      markerGroup.add(mesh);
    }

    function addMarkersFromList(list, color, radius = 0.32, height = 0.18) {
      list.forEach((pt) => addMarker(pt, color, radius, height));
    }
function flatDistance(a, b) {
  if (!a || !b) return Infinity;

  const dx = a.x - b.x;
  const dz = a.z - b.z;

  return Math.sqrt(dx * dx + dz * dz);
}

function pointOverlapsWall(pos, padding = 0.65, options = {}) {
  if (!pos) return false;

  for (const w of walls) {
    if (!w) continue;
    if (options.ignoreBarricades && w.isBarricade) continue;
    if (options.ignoreDoors && w.isDoor) continue;
    if (w.minX === undefined || w.maxX === undefined || w.minZ === undefined || w.maxZ === undefined) continue;

    if (
      pos.x > w.minX - padding &&
      pos.x < w.maxX + padding &&
      pos.z > w.minZ - padding &&
      pos.z < w.maxZ + padding
    ) {
      return true;
    }
  }

  return false;
}

function validatePointList(label, points, issues, padding = 0.65) {
  points.forEach((pt, index) => {
    if (pointOverlapsWall(pt, padding)) {
      issues.push({
        label,
        index,
        pos: pt,
        message: `${label} #${index + 1} is inside or too close to collision.`
      });
    }
  });
}

function validateGameplayLayout() {
  const issues = [];

  validatePointList('Player spawn', playerSpawnPoints, issues, 0.85);
  validatePointList('Zombie spawn', spawnPoints, issues, 0.65);
  validatePointList('Locked zombie spawn', lockedSpawnPoints, issues, 0.65);

  doors.forEach((door, index) => {
    if (!door?.pos) return;

    spawnPoints.forEach((spawn, spawnIndex) => {
      if (flatDistance(door.pos, spawn) < 2.0) {
        issues.push({
          label: 'Door',
          index,
          pos: door.pos,
          message: `Door #${index + 1} is very close to zombie spawn #${spawnIndex + 1}.`
        });
      }
    });
  });

  traps.forEach((trap, index) => {
    const pos = trap?.center || trap?.pos;
    if (!pos) return;

    if (pointOverlapsWall(pos, 0.85)) {
      issues.push({
        label: 'Trap',
        index,
        pos,
        message: `Trap #${index + 1} is inside or too close to collision.`
      });
    }
  });

  // Barricades are themselves collision objects.
  // Do not validate barricades against the wall list or they will flag themselves.

  getGameplayPointGroups(currentMapId).forEach((group) => {
    const unsafePoints = group.points.filter((pt) => pointOverlapsWall(pt, 0.95));
    const safeCount = group.points.length - unsafePoints.length;

    if (group.points.length > 0 && safeCount === 0) {
      issues.push({
        label: group.label,
        index: 0,
        pos: unsafePoints[0],
        message: `${group.label} has no safe candidate points for this map.`
      });
    }
  });

  return issues;
}

function updateValidationReport() {
  if (!validationReport) return;

  const issues = validateGameplayLayout();

  validationReport.classList.remove('ok', 'warn', 'bad');

  if (issues.length === 0) {
    validationReport.classList.add('ok');
    validationReport.innerHTML = `
      <b>Safety Validator</b><br>
      ✅ No unsafe gameplay points detected.
    `;
    return;
  }

  const maxVisible = 12;
  const visibleIssues = issues.slice(0, maxVisible);

  validationReport.classList.add(issues.length >= 5 ? 'bad' : 'warn');
  validationReport.innerHTML = `
    <b>Safety Validator</b><br>
    ⚠️ ${issues.length} issue(s) found:<br>
    ${visibleIssues.map((issue) => `• ${issue.message}`).join('<br>')}
    ${issues.length > maxVisible ? `<br>• ${issues.length - maxVisible} more issue(s)...` : ''}
  `;

  issues.forEach((issue) => {
    if (issue.pos) {
      addMarker(issue.pos, 0xff0033, 0.55, 0.10);
    }
  });
}

    function rebuildMarkers() {
      clearMarkers();

      addMarkersFromList(playerSpawnPoints, 0xffffff, 0.38, 0.22);
      addMarkersFromList(spawnPoints, 0x00ff66, 0.28, 0.18);
      addMarkersFromList(lockedSpawnPoints, 0xff2244, 0.28, 0.18);
	  
      doors.forEach((d) => {
        if (d?.pos) addMarker(d.pos, 0x00d4ff, 0.36, 0.18);
      });

      traps.forEach((t) => {
        const p = t?.center || t?.pos;
        if (p) addMarker(p, 0xffaa00, 0.40, 0.20);
      });

      barricades.forEach((b) => {
        if (b?.pos) addMarker(b.pos, 0x8b5a2b, 0.34, 0.18);
      });

      // Map-specific gameplay spawn pools
      getGameplayPointGroups(currentMapId).forEach((group) => {
        addMarkersFromList(
          group.points,
          group.color,
          group.radius || 0.28,
          group.height || 0.18
        );
      });

		updateValidationReport();
		markerGroup.visible = markersVisible;
    }

    function updateStats() {
      const meta = getMapMeta(currentMapId);

      const gameplayStatsHtml = getGameplayPointGroups(currentMapId)
        .map((group) => `${group.label} spawns: ${group.points.length}`)
        .join('<br>');

      stats.innerHTML = `
        <b>${meta.name}</b><br>
        ID: ${meta.id}<br>
        Status: ${meta.status}<br>
        Map meshes: ${mapMeshes.length}<br>
        Collision walls: ${walls.length}<br>
		Player spawns: ${playerSpawnPoints.length}<br>
		Zombie spawns: ${spawnPoints.length}<br>
		Locked zombie spawns: ${lockedSpawnPoints.length}<br>
        Doors: ${doors.length}<br>
        Traps: ${traps.length}<br>
        Barricades: ${barricades.length}<br>
        ${gameplayStatsHtml}
      `;
    }
	
    function setAngledView() {
      camera.position.set(0, 62, 72);
      controls.target.set(0, 0, 0);
      camera.lookAt(controls.target);
      controls.update();

      btnAngled.classList.add('active');
      btnTop.classList.remove('active');
    }

    function setTopView() {
      camera.position.set(0, 105, 0.01);
      controls.target.set(0, 0, 0);
      camera.lookAt(controls.target);
      controls.update();

      btnTop.classList.add('active');
      btnAngled.classList.remove('active');
    }

    function loadMap(mapId) {
      currentMapId = mapId || MAP_IDS.GRID_BUNKER;

      buildMap(currentMapId);
      rebuildMarkers();
      updateStats();
      setAngledView();
    }

    mapSelect.addEventListener('change', () => {
      loadMap(mapSelect.value);
    });

    btnAngled.addEventListener('click', setAngledView);
    btnTop.addEventListener('click', setTopView);

    btnReload.addEventListener('click', () => {
      loadMap(mapSelect.value);
    });

    btnToggle.addEventListener('click', () => {
      markersVisible = !markersVisible;
      markerGroup.visible = markersVisible;
      btnToggle.textContent = markersVisible ? 'Markers ON' : 'Markers OFF';
      btnToggle.classList.toggle('active', markersVisible);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    fillMapDropdown();
    loadMap(currentMapId);
    animate();
  </script>
</body>
</html>
