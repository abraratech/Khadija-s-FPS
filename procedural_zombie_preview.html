<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Procedural Zombie V3 Preview</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #080b0f;
      color: #d7f7d7;
      font-family: system-ui, Arial, sans-serif;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 2;
      width: 310px;
      background: rgba(0,0,0,.62);
      border: 1px solid rgba(160,255,160,.25);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    #hud b { color: #fff; }

    #hud code {
      color: #9eefff;
      font-size: 12px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    #hud button {
      background: #172217;
      color: #d7f7d7;
      border: 1px solid rgba(160,255,160,.35);
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
    }

    #hud button:hover {
      background: #233423;
    }

    #hud button.action {
      background: #1c2636;
      border-color: rgba(120,190,255,.45);
      color: #dcefff;
    }

    #hud button.danger {
      background: #351717;
      border-color: rgba(255,120,120,.45);
      color: #ffdede;
    }

    #status {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.12);
      color: #bfe8bf;
      font-size: 12px;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="hud">
    <b>Procedural Zombie V3 Preview</b><br>
    Uses real <code>js/actors/procedural_zombie.js</code><br>
    Drag = rotate camera | Wheel = zoom

    <div class="btn-row">
      <button data-type="SHAMBLER">Shambler</button>
      <button data-type="RUNNER">Runner</button>
      <button data-type="GOLIATH">Goliath</button>
      <button data-type="EXPLODER">Exploder</button>
      <button data-type="RANGED">Ranged</button>
      <button data-type="CRAWLER">Crawler</button>
    </div>

    <div class="btn-row">
      <button id="hit-test-btn" class="action">Hit Reaction</button>
      <button id="death-test-btn" class="danger">Death Animation</button>
      <button id="reset-test-btn">Reset Zombie</button>
    </div>

    <div id="status">Loading zombie preview...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import {
	createProceduralZombieVisual,
	updateProceduralZombieStyle,
	updateProceduralZombieMotion
	} from './js/actors/procedural_zombie.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080b0f);
    scene.fog = new THREE.FogExp2(0x080b0f, 0.035);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2.0, 5.0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.enableDamping = true;

    scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x203020, 2.2));

    const key = new THREE.DirectionalLight(0xffffff, 2.5);
    key.position.set(3, 5, 4);
    scene.add(key);

    const rim = new THREE.DirectionalLight(0x88ccff, 1.3);
    rim.position.set(-4, 3, -3);
    scene.add(rim);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 12),
      new THREE.MeshStandardMaterial({ color: 0x151915, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    scene.add(floor);

    const grid = new THREE.GridHelper(12, 12, 0x335533, 0x223322);
    scene.add(grid);

    const status = document.getElementById('status');

    const fallbackColors = {
      SHAMBLER: 0x7fa06b,
      RUNNER: 0x89b56a,
      GOLIATH: 0x8f7d5b,
      EXPLODER: 0xa66c48,
      RANGED: 0x6a9ca6,
      CRAWLER: 0x7a9060
    };

    let type = 'SHAMBLER';
	let zombie = null;
	let deathTestRunning = false;
	let lastTime = 0;

	const previewState = {
	  hitReactT: 0,
	  hitReactDir: 1,
	  deathT: -1
	};

    function getTypeColor(typeName) {
	return fallbackColors[typeName] ?? 0x7fa06b;
	}

    function setStatus(text) {
      status.textContent = text;
    }

    function buildZombie(nextType = type) {
      if (zombie) {
        scene.remove(zombie);
      }

      type = nextType;
		deathTestRunning = false;

		previewState.hitReactT = 0;
		previewState.hitReactDir = 1;
		previewState.deathT = -1;

      zombie = createProceduralZombieVisual({
        color: getTypeColor(type)
      });

      zombie.position.set(0, 0, 0);
      scene.add(zombie);

      updateProceduralZombieStyle(zombie, {
        type,
        name: type,
        color: getTypeColor(type)
      });

      setStatus(`Type: ${type} | Ready`);
    }

    function applyType(nextType) {
      buildZombie(nextType);
    }

    document.querySelectorAll('button[data-type]').forEach((btn) => {
      btn.addEventListener('click', () => applyType(btn.dataset.type));
    });

    document.getElementById('hit-test-btn').addEventListener('click', () => {
      if (!zombie) return;

      previewState.hitReactT = 0.18;
	  previewState.hitReactDir = Math.random() < 0.5 ? -1 : 1;
	  setStatus(`Type: ${type} | Hit reaction triggered`);
    });

    document.getElementById('death-test-btn').addEventListener('click', () => {
      if (!zombie || deathTestRunning) return;

      deathTestRunning = true;
		previewState.hitReactT = 0;
		previewState.deathT = 0;
		setStatus(`Type: ${type} | Death animation running`);
    });

    document.getElementById('reset-test-btn').addEventListener('click', () => {
      buildZombie(type);
    });

    buildZombie(type);

    function animate(ms) {
      const timeSeconds = ms * 0.001;
      const dt = lastTime ? Math.min(timeSeconds - lastTime, 0.05) : 0.016;
      lastTime = timeSeconds;

      if (zombie) {
        const previewSpeed = type === 'CRAWLER' ? 1.15 : 1.0;

        previewState.hitReactT = Math.max(0, previewState.hitReactT - dt);

		if (deathTestRunning) {
		  previewState.deathT += dt;
		}

		updateProceduralZombieMotion(zombie, timeSeconds, previewSpeed, previewState);

        // Slow display rotation after animation update.
        zombie.rotation.y = (zombie.userData.baseYaw ?? Math.PI) + Math.sin(timeSeconds * 0.25) * 0.25;

        if (deathTestRunning && previewState.deathT >= 0.75) {
		  deathTestRunning = false;
		  setStatus(`Type: ${type} | Death animation complete. Press Reset Zombie.`);
		}
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
